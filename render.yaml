services:
  - type: web
    name: ai-resume-python-nlp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: ai-service
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: ai-resume-node-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://99250040566_db_user:99250040566_db_user@01.ltjbq5a.mongodb.net/ai-resume-analyzer?retryWrites=true&w=majority
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: student_ai_analyzer_secret_key_2024 # Change this in production!
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: ai-resume-python-nlp
          envVarKey: RENDER_EXTERNAL_URL

  - type: static
    name: ai-resume-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: website
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-resume-node-backend
          envVarKey: RENDER_EXTERNAL_URL
